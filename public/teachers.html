<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>千岛游学 · 选择你的老师</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1a2744;--navy2:#243460;--red:#e63946;--gold:#f4a261;--cream:#fdf8f0;--warm:#fff9f2;--td:#1a1a2e;--tm:#4a4a6a;--tl:#8888aa;--border:rgba(26,39,68,0.08);--shadow:0 4px 24px rgba(26,39,68,0.10)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
.back-nav{display:none;align-items:center;background:#fff;border-bottom:1px solid rgba(26,39,68,0.08);padding:10px 24px;gap:8px}
.back-nav a{display:flex;align-items:center;gap:6px;text-decoration:none;color:#1a2744;font-size:13px;font-weight:500;opacity:0.7;transition:opacity 0.2s}
.back-nav a:hover{opacity:1}
.back-nav a svg{width:16px;height:16px}
body{font-family:"DM Sans",sans-serif;background:var(--cream);color:var(--td);min-height:100vh;overflow-x:hidden}
.header{background:var(--navy);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.2)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 20px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-family:"Noto Serif SC",serif;font-size:16px;font-weight:700;color:#fff;line-height:1.2}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.5);font-weight:300;letter-spacing:.05em}
.header-tag{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.15)}
.hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,#2d4a8a 100%);padding:28px 20px 32px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;right:-30px;top:-30px;width:180px;height:180px;background:radial-gradient(circle,rgba(230,57,70,0.15) 0%,transparent 70%);border-radius:50%}
.hero h1{font-family:"Noto Serif SC",serif;font-size:22px;font-weight:700;color:#fff;line-height:1.4;position:relative;z-index:1}
.hero h1 span{color:var(--gold)}
.hero p{font-size:13px;color:rgba(255,255,255,0.65);margin-top:8px;line-height:1.6;position:relative;z-index:1}

.filter-bar{padding:14px 20px 10px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--tm);font-size:12px;font-family:"DM Sans",sans-serif;cursor:pointer;font-weight:500}
.filter-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.filter-btn.hot-btn{border-color:#ff6b35;color:#ff6b35;}
.filter-btn.hot-btn.active{background:#ff6b35;border-color:#ff6b35;color:#fff;}
.section-title{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between}
.section-title h2{font-family:"Noto Serif SC",serif;font-size:16px;font-weight:600}
.count-badge{background:var(--navy);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.teacher-grid{padding:0 16px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(min-width:768px){.teacher-grid{grid-template-columns:repeat(4,1fr);gap:16px;padding:0 24px 24px;max-width:1200px;margin:0 auto}.teacher-card .card-avatar{aspect-ratio:3/4}.back-nav{display:flex}.section-title{max-width:1200px;margin-left:auto;margin-right:auto}.filter-bar{max-width:1200px;margin-left:auto;margin-right:auto}}
.teacher-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;border:1.5px solid var(--border);animation:fadeUp 0.4s ease both}
.teacher-card:active{transform:scale(0.96)}
.card-avatar{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-avatar::after{content:"";position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(to top,rgba(0,0,0,0.3),transparent)}
.avatar-initial{font-size:36px;font-weight:600;color:rgba(255,255,255,0.9);text-transform:uppercase;position:relative;z-index:1}
.card-tag{position:absolute;top:8px;right:8px;background:var(--red);color:#fff;font-size:9px;padding:3px 8px;border-radius:10px;font-weight:600;z-index:2}
.card-body{padding:12px}
.card-name{font-size:15px;font-weight:600;color:var(--td)}
.card-spec{font-size:11px;color:var(--tl);margin-top:3px;line-height:1.4}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.avail-dot{display:flex;align-items:center;gap:4px;font-size:11px;color:#2ecc71;font-weight:500}
.avail-dot::before{content:"";width:6px;height:6px;background:#2ecc71;border-radius:50%;display:block}
.view-btn{font-size:11px;color:var(--navy);font-weight:600}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s;backdrop-filter:blur(4px)}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--warm);border-radius:24px 24px 0 0;z-index:300;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.34,1.2,0.64,1);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-sheet.active{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:rgba(0,0,0,0.15);border-radius:2px;margin:12px auto 0}
.sheet-close{position:absolute;top:16px;right:20px;width:32px;height:32px;background:rgba(0,0,0,0.08);border:none;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tm)}
.profile-header{display:flex;align-items:center;gap:16px;padding:20px 20px 16px}
.profile-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:600;color:#fff;flex-shrink:0;border:3px solid #fff;box-shadow:0 4px 16px rgba(26,39,68,0.2)}
.profile-info h2{font-size:22px;font-weight:700;color:var(--td)}
.spec-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.spec-tag{background:rgba(26,39,68,0.07);color:var(--tm);font-size:10px;padding:3px 9px;border-radius:8px;font-weight:500}
.spec-tag.highlight{background:rgba(230,57,70,0.1);color:var(--red)}
.tab-nav{display:flex;border-bottom:2px solid var(--border);margin:0 20px}
.tab-btn{flex:1;padding:12px 0;font-size:13px;font-weight:600;color:var(--tl);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;font-family:"DM Sans",sans-serif}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy)}
.tab-content{display:none;padding:20px}
.tab-content.active{display:block}
.video-link{display:block;background:var(--navy);border-radius:16px;padding:24px 20px;text-align:center;position:relative;overflow:hidden;text-decoration:none}
.play-icon{width:60px;height:60px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;position:relative;z-index:1}
.video-link p{color:rgba(255,255,255,0.9);font-size:14px;font-weight:600;position:relative;z-index:1}
.video-link small{color:rgba(255,255,255,0.5);font-size:11px;display:block;margin-top:4px;position:relative;z-index:1}
.bio-section{margin-top:16px}
.bio-section h3{font-family:"Noto Serif SC",serif;font-size:14px;color:var(--td);font-weight:600;margin-bottom:8px}
.bio-text{font-size:13px;color:var(--tm);line-height:1.7;background:#fff;padding:14px;border-radius:12px;border:1px solid var(--border)}
.schedule-link{display:block;text-decoration:none;background:var(--navy);color:#fff;border-radius:14px;padding:16px;font-size:15px;font-weight:600;text-align:center;margin-top:8px}
.footer{padding:32px 20px 40px;text-align:center;color:var(--tl);font-size:12px}
.footer strong{display:block;font-family:"Noto Serif SC",serif;font-size:14px;color:var(--tm);margin-bottom:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

var hotOrder = ["Mae","Monique","Hannah","Jaimee","Vane","Ann"];
var businessOrder = ["Mae","Davy","Monique","Vane","Mark","Aura","Gratch","Rose","Mayen","Cha","Van","Ylana","Tin"];
var adultOrder = ["Micah","Charles","Aiza","Franz","Jaimee","Janice","Chai"];
var ieltsOrder = ["Julie","Mayen","Claire","Jen","Mae","Tin"];
var kidsOrder = ["Nikki","Hannah","Jaimee","Ann","Micah","Aiza","Tricia","Jury"];
var categoryOrders = {hot: hotOrder, business: businessOrder, adult: adultOrder, ielts: ieltsOrder, kids: kidsOrder};

function renderGrid(filter) {
  var grid = document.getElementById("teacherGrid");
  grid.innerHTML = "";
  var count = 0;
  var list;
  var orderArr = categoryOrders[filter];
  if (orderArr) {
    list = [];
    for (var h = 0; h < orderArr.length; h++) {
      for (var j = 0; j < teachers.length; j++) {
        if (teachers[j].name === orderArr[h]) { list.push(teachers[j]); break; }
      }
    }
  } else {
    list = teachers;
  }
  for (var i = 0; i < list.length; i++) {
    var t = list[i];
    if (filter === "business" && t.tagTypes.indexOf("business") === -1) continue;
    if (filter === "adult" && t.tagTypes.indexOf("adult") === -1) continue;
    if (filter === "kids" && t.tagTypes.indexOf("kids") === -1) continue;
    if (filter === "ielts" && t.tagTypes.indexOf("ielts") === -1) continue;
    count++;
    var card = document.createElement("div");
    card.className = "teacher-card";
    card.style.animationDelay = (count * 0.05) + "s";
    var isHot = hotOrder.indexOf(t.name) !== -1;
    card.innerHTML = "<div class='card-avatar' style='background:linear-gradient(135deg," + t.color + " 0%," + t.color + "cc 100%)' >" +
      (teacherPhotos[t.name] ? "<img src='" + teacherPhotos[t.name] + "' style='width:100%;height:100%;object-fit:cover;object-position:top;position:absolute;top:0;left:0'>" : "<div class='avatar-initial'>" + t.name[0] + "</div>") +
      (isHot ? "<div style='position:absolute;top:8px;left:8px;font-size:16px;z-index:3'>🔥</div>" : "") +
      "</div>" +
      "<div class='card-body'><div class='card-name'>" + t.name + "</div>" +
      "<div class='card-spec'>" + t.tags.join(" · ") + "</div>" +
      "<div class='card-footer'><div class='avail-dot'>可预约</div>" +
      "<div class='view-btn'>查看 &#8594;</div></div></div>";
    (function(teacher) {
      card.onclick = function() { openModal(teacher); };
    })(t);
    grid.appendChild(card);
  }
  document.getElementById("teacherCount").textContent = count + "位";
}

function filterTeachers(type, btn) {
  var btns = document.querySelectorAll(".filter-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");
  btn.classList.add("active");
  renderGrid(type);
}

function openModal(teacher) {
  if (teacherPhotos[teacher.name]) {
    document.getElementById("profileAvatar").innerHTML = "<img src='" + teacherPhotos[teacher.name] + "' style='width:100%;height:100%;object-fit:cover;object-position:top;border-radius:50%'>";
  } else {
    document.getElementById("profileAvatar").textContent = teacher.name[0];
  }
  document.getElementById("profileAvatar").style.background = "linear-gradient(135deg," + teacher.color + " 0%," + teacher.color + "cc 100%)";
  document.getElementById("profileName").textContent = teacher.name;
  document.getElementById("profileBio").textContent = teacher.bio;
  var html = "";
  for (var i = 0; i < teacher.tags.length; i++) {
    html += "<span class='spec-tag " + (i === 0 ? "highlight" : "") + "'>" + teacher.tags[i] + "</span>";
  }
  document.getElementById("profileTags").innerHTML = html;
  document.getElementById("videoText").textContent = "观看 " + teacher.name + " 的自我介绍";
  document.getElementById("videoLink").href = teacher.videoUrl;
  document.getElementById("scheduleLink").href = teacher.scheduleUrl;
  switchTab("intro", document.querySelector(".tab-btn"));
  document.getElementById("modalOverlay").classList.add("active");
  document.getElementById("modalSheet").classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("active");
  document.getElementById("modalSheet").classList.remove("active");
  document.body.style.overflow = "";
}

function switchTab(tabId, btn) {
  var tabBtns = document.querySelectorAll(".tab-btn");
  var tabContents = document.querySelectorAll(".tab-content");
  for (var i = 0; i < tabBtns.length; i++) tabBtns[i].classList.remove("active");
  for (var i = 0; i < tabContents.length; i++) tabContents[i].classList.remove("active");
  if (btn) btn.classList.add("active");
  document.getElementById("tab-" + tabId).classList.add("active");
}

renderGrid("hot");
</script>
